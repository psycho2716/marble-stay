<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Marble Stay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/app.css" />
  </head>
  <body class="flex min-h-screen flex-col bg-background text-foreground" data-base="">
    <div id="marble-header"></div>
    <main class="flex flex-1 items-center justify-center px-4 py-12">
      <div class="w-full max-w-md rounded-xl border border-border bg-card p-8 shadow-sm">
        <h1 class="text-center text-3xl font-bold tracking-tight text-foreground">Welcome back</h1>
        <p class="mt-1 text-center text-muted-foreground">
          Sign in with a predefined demo account (same as <code class="rounded bg-muted px-1 text-xs">supabase/seed.sql</code>).
        </p>
        <p class="mt-3 text-center text-sm">
          <a href="accounts.html" class="font-medium text-primary hover:underline">View demo emails and passwords</a>
        </p>
        <form id="login-form" class="mt-6 space-y-5">
          <div id="login-error" class="hidden rounded-lg border border-destructive/30 bg-destructive/10 px-4 py-3 text-sm text-destructive"></div>
          <div>
            <label for="login-email" class="mb-1 block text-sm font-medium text-foreground">Email</label>
            <input
              id="login-email"
              type="email"
              required
              class="w-full rounded-lg border border-input bg-background px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-primary/20"
              placeholder="name@company.com"
            />
          </div>
          <div>
            <div class="mb-1 flex items-center justify-between">
              <label for="login-password" class="text-sm font-medium text-foreground">Password</label>
              <span class="text-sm font-medium text-primary">Forgot password?</span>
            </div>
            <div class="relative">
              <input
                id="login-password"
                type="password"
                required
                class="w-full rounded-lg border border-input bg-background py-2.5 pl-3 pr-10 text-sm outline-none focus:ring-2 focus:ring-primary/20"
              />
              <button
                type="button"
                id="toggle-pw"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground"
                aria-label="Show password"
              >
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </button>
            </div>
          </div>
          <button
            type="submit"
            id="login-submit"
            class="w-full rounded-lg bg-primary py-2.5 text-sm font-medium text-primary-foreground transition hover:opacity-90 disabled:opacity-50"
          >
            Login
          </button>
        </form>
        <p class="mt-6 text-center text-sm text-muted-foreground">
          New accounts are not created in this demo—use the seeded logins only.
        </p>
      </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chrome.js"></script>
    <script>
      (async function () {
        const data = await MarbleData.loadData();
        await MarbleAuth.ensureSeededUsers(data);
        MarbleChrome.mount({ area: "public", active: "login", hideFooter: true });

        document.getElementById("toggle-pw").addEventListener("click", function () {
          const i = document.getElementById("login-password");
          i.type = i.type === "password" ? "text" : "password";
        });

        document.getElementById("login-form").addEventListener("submit", async function (e) {
          e.preventDefault();
          const err = document.getElementById("login-error");
          err.classList.add("hidden");
          const email = document.getElementById("login-email").value;
          const password = document.getElementById("login-password").value;
          const btn = document.getElementById("login-submit");
          btn.disabled = true;
          btn.textContent = "Signing in…";
          const r = MarbleAuth.login(email, password);
          if (!r.ok) {
            err.textContent = r.error;
            err.classList.remove("hidden");
            btn.disabled = false;
            btn.textContent = "Login";
            return;
          }
          const s = MarbleAuth.getSession();
          const nextRaw = new URLSearchParams(window.location.search).get("next");
          let nextSafe = null;
          try {
            const d = nextRaw ? decodeURIComponent(nextRaw) : "";
            if (
              d &&
              d.length <= 512 &&
              !d.includes("..") &&
              !/^[\\/]{2}/.test(d) &&
              !/^https?:/i.test(d) &&
              /\.html\b/i.test(d)
            ) {
              nextSafe = d;
            }
          } catch (_) {
            nextSafe = null;
          }
          if (s.role === "hotel") window.location.href = "hotel/dashboard.html";
          else if (s.role === "admin") window.location.href = "admin/verification.html";
          else if (!s.onboardingComplete) window.location.href = "onboarding.html";
          else if (nextSafe) window.location.href = nextSafe;
          else window.location.href = "index.html";
        });
      })();
    </script>
  </body>
</html>
