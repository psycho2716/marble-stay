<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel — Marble Stay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/app.css" />
  </head>
  <body class="flex min-h-screen flex-col bg-background" data-base="">
    <div id="marble-header"></div>
    <main id="main" class="flex-1 bg-background"></main>
    <div id="marble-footer"></div>
    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/maps.js"></script>
    <script src="js/chrome.js"></script>
    <script>
      function amenityLabel(a) {
        return String(a).replace(/_/g, " ");
      }
      function uniqueAmenities(rooms) {
        const s = new Set();
        rooms.forEach(function (r) {
          (r.amenities || []).forEach(function (x) {
            s.add(amenityLabel(x));
          });
        });
        return Array.from(s);
      }
      MarbleData.loadData().then(async function (data) {
        await MarbleAuth.ensureSeededUsers(data);
        MarbleChrome.mount({ area: "auto", active: window.location.pathname, isHotelSection: false });
        const id = MarbleUtils.getHotelDetailId();
        const hotel = id ? MarbleData.hotelById(data, id) : null;
        const main = document.getElementById("main");
        if (!id) {
          main.innerHTML =
            '<div class="mx-auto max-w-6xl px-4 py-10"><h1 class="text-lg font-semibold text-foreground">No hotel selected</h1><p class="mt-2 max-w-md text-sm text-muted-foreground">Open this page from a hotel card on the <a href="hotels.html" class="font-medium text-primary hover:underline">hotels list</a> or the home page so the correct property loads.</p><a href="hotels.html" class="mt-6 inline-block text-sm font-medium text-primary hover:underline">← Browse hotels</a></div>';
          return;
        }
        if (!hotel) {
          main.innerHTML =
            '<div class="mx-auto max-w-6xl px-4 py-10"><p class="text-sm text-muted-foreground">We couldn’t find that property.</p><a href="hotels.html" class="mt-4 inline-block text-sm font-medium text-primary hover:underline">← Back to hotels</a></div>';
          return;
        }
        const rooms = MarbleData.roomsForHotel(data, hotel.id);
        const amenities = uniqueAmenities(rooms);
        const hr = MarbleData.hotelRatingSummary(data, hotel.id);
        const rating = hr.average != null ? hr.average.toFixed(1) : "0";
        const rc = hr.count;
        const cover = hotel.coverImage || (hotel.images && hotel.images[0]) || "";

        main.innerHTML =
          '<div class="relative h-64 w-full bg-muted sm:h-80 md:h-96">' +
          (cover
            ? '<img src="' + cover + '" alt="" class="h-full w-full object-cover" />'
            : '<div class="flex h-full items-center justify-center text-muted-foreground">No cover</div>') +
          '<div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>' +
          '<div class="absolute bottom-0 left-0 right-0 p-6 text-white md:p-8 lg:left-[12%] lg:right-[12%]">' +
          "<h1 class=\"text-2xl font-bold md:text-3xl\">" +
          hotel.name +
          '</h1><div class="mt-2 flex flex-wrap items-center gap-4 text-sm text-white/90">' +
          '<span class="inline-flex items-center gap-1"><svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>' +
          hotel.address +
          '</span><span class="inline-flex items-center gap-1 font-semibold text-amber-400"><svg class="h-4 w-4 fill-amber-400 text-amber-400" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' +
          rating +
          " (" +
          rc +
          " reviews)</span></div></div></div>" +
          '<div class="mx-auto max-w-[85%] px-4 py-8"><div class="flex flex-col gap-8 lg:flex-row lg:items-start">' +
          '<aside class="w-full shrink-0 space-y-8 lg:w-[30%] lg:max-w-sm">' +
          '<section><h2 class="mb-3 text-xs font-semibold uppercase tracking-wide text-muted-foreground">Opening Hours</h2><ul class="space-y-2 text-sm">' +
          '<li class="flex justify-between gap-4"><span class="text-muted-foreground">Check-in</span><span class="font-semibold">From ' +
          (hotel.checkInTime || "—") +
          '</span></li><li class="flex justify-between gap-4"><span class="text-muted-foreground">Check-out</span><span class="font-semibold">Until ' +
          (hotel.checkOutTime || "—") +
          '</span></li><li class="flex justify-between gap-4"><span class="text-muted-foreground">Front Desk</span><span class="font-semibold">24/7 Service</span></li></ul></section>' +
          (amenities.length
            ? '<section><h2 class="mb-3 text-xs font-semibold uppercase tracking-wide text-muted-foreground">Amenities</h2><ul class="grid grid-cols-2 gap-3 text-sm">' +
              amenities
                .map(function (n) {
                  return "<li class=\"flex items-center gap-2\"><span class=\"h-1.5 w-1.5 rounded-full bg-foreground\"></span>" + n + "</li>";
                })
                .join("") +
              "</ul></section>"
            : "") +
          '<section><h2 class="mb-3 text-xs font-semibold uppercase tracking-wide text-muted-foreground">Location</h2><div id="hotel-map" class="h-52 w-full overflow-hidden rounded-lg border border-border bg-muted"></div><a id="hotel-maps-link" href="#" target="_blank" rel="noopener" class="mt-2 inline-block text-sm font-medium text-primary hover:underline">Open in Google Maps →</a></section>' +
          '<section><h2 class="mb-3 text-xs font-semibold uppercase tracking-wide text-muted-foreground">About the Hotel</h2><p class="text-sm text-muted-foreground">' +
          (hotel.description || "") +
          (hotel.bio ? "<br/><br/>" + hotel.bio : "") +
          "</p></section></aside>" +
          '<div class="min-w-0 flex-1"><div class="mb-4 flex items-center justify-between"><h2 class="text-xl font-bold md:text-2xl">Available Rooms</h2><span class="rounded-lg border border-border bg-card p-2 text-muted-foreground"><svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg></span></div>' +
          '<ul id="room-grid" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3"></ul></div></div></div>';

        const lat = hotel.latitude;
        const lng = hotel.longitude;
        const mapsLink = document.getElementById("hotel-maps-link");
        if (lat != null && lng != null) {
          mapsLink.href = "https://www.google.com/maps?q=" + lat + "," + lng;
          MarbleMaps.renderMap(document.getElementById("hotel-map"), { lat: Number(lat), lng: Number(lng) });
        } else {
          mapsLink.href =
            "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(hotel.address || "");
        }

        document.getElementById("room-grid").innerHTML =
          rooms.length === 0
            ? '<p class="col-span-full rounded border border-border bg-card p-6 text-center text-sm text-muted-foreground">No rooms listed.</p>'
            : rooms
                .map(function (r) {
                  const img = r.media && r.media[0] ? r.media[0] : "";
                  return (
                    '<li><a href="' +
                    MarbleUtils.roomDetailHref(r.id) +
                    '" class="group block overflow-hidden rounded-xl border border-border bg-card shadow-sm transition hover:border-primary/30">' +
                    '<div class="aspect-[4/3] bg-muted">' +
                    (img
                      ? '<img src="' + img + '" alt="" class="h-full w-full object-cover transition group-hover:scale-[1.02]" />'
                      : "") +
                    '</div><div class="p-4"><h3 class="font-semibold">' +
                    r.name +
                    '</h3><p class="mt-1 line-clamp-2 text-sm text-muted-foreground">' +
                    (r.description || "") +
                    '</p><p class="mt-3 text-sm font-semibold">' +
                    MarbleUtils.formatCurrency(r.basePriceNight, hotel.currency) +
                    " / night</p></div></a></li>"
                  );
                })
                .join("");
      });
    </script>
  </body>
</html>
