<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verification — Marble Stay Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/app.css" />
  </head>
  <body class="flex min-h-screen flex-col bg-background" data-base="..">
    <div id="marble-header"></div>
    <main class="mx-auto max-w-6xl flex-1 px-4 py-8">
      <h1 class="text-3xl font-bold">Hotel verification</h1>
      <p class="mt-1 text-muted-foreground">Properties awaiting verification.</p>
      <ul id="list" class="mt-8 space-y-3"></ul>
    </main>
    <div id="marble-footer"></div>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/chrome.js"></script>
    <script>
      MarbleData.loadData().then(async function (data) {
        await MarbleAuth.ensureSeededUsers(data);
        const s = MarbleAuth.requireAdmin();
        if (!s) return;
        MarbleChrome.mount({ area: "admin", active: "verification" });
        const pending = data.hotels.filter(function (h) {
          return MarbleData.verificationStatusOf(h) === "pending";
        });
        document.getElementById("list").innerHTML =
          pending.length === 0
            ? '<li class="text-muted-foreground">No pending hotels.</li>'
            : pending
                .map(function (h) {
                  return (
                    '<li><a href="verification-detail.html?id=' +
                    encodeURIComponent(h.id) +
                    '" class="flex items-center justify-between rounded-lg border border-border bg-card p-4 hover:border-primary/30"><span class="font-medium">' +
                    h.name +
                    '</span><span class="text-sm text-muted-foreground">Review →</span></a></li>'
                  );
                })
                .join("");
      });
    </script>
  </body>
</html>
