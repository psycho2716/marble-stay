<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review hotel — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/app.css" />
  </head>
  <body class="flex min-h-screen flex-col bg-background" data-base="..">
    <div id="marble-header"></div>
    <main class="mx-auto max-w-4xl flex-1 px-4 py-8" id="main"></main>
    <div id="marble-footer"></div>
    <script src="../js/utils.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/maps.js"></script>
    <script src="../js/chrome.js"></script>
    <script>
      const STATUS_KEY = "marble_stay_hotel_verification";
      function setStatus(hotelId, status) {
        const o = JSON.parse(localStorage.getItem(STATUS_KEY) || "{}");
        o[hotelId] = status;
        localStorage.setItem(STATUS_KEY, JSON.stringify(o));
      }

      MarbleData.loadData().then(async function (data) {
        await MarbleAuth.ensureSeededUsers(data);
        const s = MarbleAuth.requireAdmin();
        if (!s) return;
        MarbleChrome.mount({ area: "admin", active: "verification-detail" });
        const id = MarbleUtils.getQueryParam("id");
        const hotel = MarbleData.hotelById(data, id);
        const el = document.getElementById("main");
        if (!hotel) {
          el.innerHTML = "<p>Not found.</p>";
          return;
        }
        const st = MarbleData.verificationStatusOf(hotel);
        el.innerHTML =
          '<a href="verification.html" class="text-sm text-primary hover:underline">← Back</a>' +
          '<div class="mt-6 rounded-xl border border-border bg-card p-6"><h1 class="text-2xl font-bold">' +
          hotel.name +
          '</h1><p class="mt-2 capitalize text-muted-foreground">Status: <strong>' +
          st +
          '</strong></p><p class="mt-4 text-sm">' +
          hotel.address +
          '</p><div id="amap" class="mt-6 h-56 w-full rounded-lg border border-border"></div>' +
          '<div class="mt-6 flex flex-wrap gap-3"><button type="button" id="approve" class="rounded-lg bg-primary px-4 py-2 text-sm font-medium text-primary-foreground">Approve property</button>' +
          '<button type="button" id="reject" class="rounded-lg border border-border px-4 py-2 text-sm">Reject application</button></div></div>';
        MarbleMaps.renderMap(
          document.getElementById("amap"),
          { lat: Number(hotel.latitude), lng: Number(hotel.longitude) }
        );
        document.getElementById("approve").addEventListener("click", function () {
          setStatus(hotel.id, "verified");
          window.location.href = "verification.html";
        });
        document.getElementById("reject").addEventListener("click", function () {
          setStatus(hotel.id, "rejected");
          window.location.href = "verification.html";
        });
      });
    </script>
  </body>
</html>
