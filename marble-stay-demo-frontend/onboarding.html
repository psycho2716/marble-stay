<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding — Marble Stay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/app.css" />
  </head>
  <body class="flex min-h-screen flex-col bg-background" data-base="">
    <div id="marble-header"></div>
    <main class="mx-auto max-w-xl flex-1 px-4 py-10">
      <h1 class="text-2xl font-bold">Complete your guest profile</h1>
      <p class="mt-1 text-sm text-muted-foreground">Tell us how you travel so we can tailor your stays.</p>
      <form id="onb-form" class="mt-8 space-y-4">
        <div>
          <label class="mb-1 block text-sm font-medium">Travel needs</label>
          <textarea name="travel" rows="3" class="w-full rounded-lg border border-input bg-background px-3 py-2 text-sm"></textarea>
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium">Budget min (PHP)</label>
          <input name="budgetMin" type="number" class="w-full rounded-lg border border-input bg-background px-3 py-2 text-sm" value="2000" />
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium">Budget max (PHP)</label>
          <input name="budgetMax" type="number" class="w-full rounded-lg border border-input bg-background px-3 py-2 text-sm" value="6000" />
        </div>
        <button type="submit" class="rounded-lg bg-primary px-6 py-2.5 text-sm font-medium text-primary-foreground">Finish</button>
      </form>
    </main>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chrome.js"></script>
    <script>
      MarbleData.loadData().then(async function (d) {
        await MarbleAuth.ensureSeededUsers(d);
        const s = MarbleAuth.requireGuest("login.html");
        if (!s) return;
        if (s.onboardingComplete) {
          window.location.href = "index.html";
          return;
        }
        MarbleChrome.mount({ area: "guest", active: "onboarding", hideFooter: true });
        document.getElementById("onb-form").addEventListener("submit", function (e) {
          e.preventDefault();
          const fd = new FormData(e.target);
          MarbleAuth.setGuestPrefs({
            travel: fd.get("travel"),
            budgetMin: fd.get("budgetMin"),
            budgetMax: fd.get("budgetMax")
          });
          MarbleAuth.completeOnboardingForSession();
          window.location.href = "index.html";
        });
      });
    </script>
  </body>
</html>
